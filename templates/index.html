<!DOCTYPE html>
<html>
<head>
    <title>Emotion Detector</title>
</head>
<body>

<h1>Emotion Detection App</h1>

<form action="/detect" method="POST">
    <textarea name="text"></textarea>
    <br><br>
    <button type="submit">Detect</button>
</form>

{% if result %}
<p><b>Dominant Emotion:</b> {{ result.dominant_emotion }}</p>
{% endif %}

</body>
</html>
